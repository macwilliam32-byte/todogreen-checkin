<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TodoGreen Disponibilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#121712;
    --panel:#1c2420;
    --panel-2:#232c27;
    --line:#374039;
    --brand:#14733c;
    --accent:#43c98a;
    --c1:#14733c; --c1-light:#43c98a;
    --c2:#1c6fa0; --c2-light:#5ec3e8;
    --c3:#b5651d; --c3-light:#f2a955;
    --red:#e2503a;
    --text:#edf3ee;
    --text-dim:#93a39a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, #1e2620 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* ---- header ---- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 10px;
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand img{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(20,115,60,.4));}
  .brand-text{display:flex;flex-direction:column;line-height:1;}
  .brand .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--accent);margin-bottom:4px;}
  .brand h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:21px;letter-spacing:.02em;margin:0;text-transform:uppercase;}
  .nav-toggle{
    background:none;border:1px solid var(--line);color:var(--text-dim);
    font-family:'Inter';font-size:12.5px;padding:8px 12px;border-radius:8px;cursor:pointer;
  }
  .nav-toggle:active{background:var(--panel-2);}

  main{flex:1;padding:6px 20px 32px;display:flex;flex-direction:column;gap:22px;}

  /* ---- radar / geofence gauge ---- */
  .radar-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 0 4px;}
  .radar{
    position:relative;width:196px;height:196px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,var(--panel) 0%,var(--panel) 55%,transparent 56%);
  }
  .ring{
    position:absolute;border-radius:50%;border:1px solid var(--line);
    top:0;left:0;right:0;bottom:0;
  }
  .ring.r1{inset:0;}
  .ring.r2{inset:22px;}
  .ring.r3{inset:44px;border-style:dashed;border-color:var(--accent);opacity:.55;}
  .pulse{
    position:absolute;inset:44px;border-radius:50%;
    border:2px solid var(--accent);opacity:0;
    animation:pulse 2.6s ease-out infinite;
  }
  .pulse.off{border-color:var(--red);}
  @keyframes pulse{
    0%{transform:scale(.72);opacity:.6;}
    80%{transform:scale(1.35);opacity:0;}
    100%{opacity:0;}
  }
  .radar-core{position:relative;text-align:center;z-index:2;}
  .radar-core .num{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;}
  .radar-core .unit{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.06em;}
  .status-line{font-family:'Oswald',sans-serif;font-size:13.5px;text-transform:uppercase;letter-spacing:.06em;padding:6px 14px;border-radius:20px;}
  .status-line.ok{color:var(--accent);background:rgba(67,201,138,.14);}
  .status-line.bad{color:var(--red);background:rgba(226,80,58,.12);}
  .status-line.wait{color:var(--text-dim);background:rgba(255,255,255,.05);}

  /* ---- fields ---- */
  label.field-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:8px;}
  input[type="text"], select, input[type="date"]{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:13px 14px;border-radius:10px;font-size:15px;font-family:'Inter';
  }
  input:focus, select:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .driver-card{
    margin-top:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;display:none;gap:10px;align-items:center;justify-content:space-between;
  }
  .driver-card.show{display:flex;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:5px 10px;border-radius:6px;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);}
  .chip.plate{color:var(--accent);letter-spacing:.05em;}

  .bays{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .bay-btn{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--text-dim);
    padding:16px 4px;text-align:center;cursor:pointer;font-family:'Oswald';
  }
  .bay-btn .n{display:block;font-size:26px;font-weight:700;color:var(--text);}
  .bay-btn .l{display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  .bay-btn .t{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:5px;}
  .bay-btn.active{border-color:var(--accent);background:rgba(20,115,60,.22);}
  .bay-btn.active .n{color:var(--accent);}
  .bay-btn[data-bay="1"].active{border-color:var(--c1-light);background:rgba(20,115,60,.22);}
  .bay-btn[data-bay="1"].active .n{color:var(--c1-light);}
  .bay-btn[data-bay="2"].active{border-color:var(--c2-light);background:rgba(28,111,160,.22);}
  .bay-btn[data-bay="2"].active .n{color:var(--c2-light);}
  .bay-btn[data-bay="3"].active{border-color:var(--c3-light);background:rgba(181,101,29,.22);}
  .bay-btn[data-bay="3"].active .n{color:var(--c3-light);}
  .bay-btn.closed{opacity:.4;pointer-events:none;}
  .bay-btn.closed .t{color:var(--red);}
  .bay-btn.done{opacity:.55;pointer-events:none;border-color:var(--accent);background:rgba(67,201,138,.08);}
  .bay-btn.done .l{color:var(--accent);}

  .submit-btn{
    margin-top:4px;width:100%;padding:16px;border-radius:12px;border:none;
    font-family:'Oswald';font-size:15.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;
    background:var(--brand);color:#eef8f1;cursor:pointer;
  }
  .submit-btn:disabled{background:var(--panel-2);color:var(--text-dim);cursor:not-allowed;}

  .toast{
    font-family:'Inter';font-size:13.5px;text-align:center;padding:12px;border-radius:10px;display:none;
  }
  .toast.show{display:block;}
  .toast.ok{background:rgba(67,201,138,.14);color:var(--accent);border:1px solid rgba(67,201,138,.35);}
  .toast.bad{background:rgba(226,80,58,.12);color:var(--red);border:1px solid rgba(226,80,58,.3);}

  /* ---- report view ---- */
  .report-filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .report-filters .full{grid-column:1/-1;}
  .summary-row{display:flex;gap:8px;}
  .summary-card{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;}
  .summary-card .n{font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:var(--accent);}
  .summary-card .l{font-size:10px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{text-align:left;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.06em;color:var(--text-dim);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line);}
  tbody td{padding:8px;border-bottom:1px solid var(--line);color:var(--text);}
  tbody tr:last-child td{border-bottom:none;}
  .table-wrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;}
  .export-btn{
    background:var(--brand);color:#eef8f1;border:none;padding:13px;border-radius:10px;
    font-family:'Oswald';font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:14px;cursor:pointer;
  }
  .empty-note{color:var(--text-dim);font-size:13px;text-align:center;padding:24px 10px;}
  .hidden{display:none !important;}
</style>
</head>

  <!-- ============ CHECK-IN VIEW ============ -->
  <main id="checkinView">

    <div class="status-line wait" id="windowStatus" style="align-self:center;">Disponível das 6h às 16h</div>

    <div>
      <label class="field-label" for="driverInput">Motorista</label>
      <input type="text" id="driverInput" list="driverList" placeholder="Digite ou busque o nome" autocomplete="off">
      <datalist id="driverList"></datalist>
      <div class="driver-card" id="driverCard">
        <span class="chip plate" id="cardPlate">—</span>
        <span class="chip" id="cardType">—</span>
      </div>
    </div>

    <div>
      <label class="field-label">Carregamento</label>
      <div class="bays" style="grid-template-columns:1fr;">
        <div class="bay-btn" data-bay="Amazon"><span class="n">Amazon</span><span class="l">Toque para confirmar</span></div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" disabled>Registrar disponibilidade</button>
    <div class="toast" id="toast"></div>
  </main>

  <!-- ============ REPORT VIEW ============ -->
  <main id="reportView" class="hidden">
    <div class="summary-row" id="summaryRow"></div>

    <div class="report-filters">
      <div>
        <label class="field-label">De</label>
        <input type="date" id="filterFrom">
      </div>
      <div>
        <label class="field-label">Até</label>
        <input type="date" id="filterTo">
      </div>
      <div class="full">
        <label class="field-label">Motorista</label>
        <select id="filterDriver"><option value="">Todos</option></select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Data</th><th>Motorista</th><th>Placa</th><th>Veíc.</th></tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
      <div class="empty-note hidden" id="emptyNote">Nenhum registro de presença ainda.</div>
    </div>

    <button class="export-btn" id="exportBtn">Exportar planilha (.xlsx)</button>
  </main>

</div>

<script>
/* ========================================================================= */
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6auNo4xo-nZFqbN0xeL6ImSwXL_XYmXB8_9-G7TE-o32ku_jdep0I2stc49Lk5Ezzsw/exec";
const ADMIN_KEY = "todogreen2026";  // <- troque por uma senha sua; use no link admin (?admin=SUACHAVE)

// Janela permitida para marcar disponibilidade (mesmo dia: 6h -> 16h)
const AVAILABILITY_WINDOW = { startH: 6, startM: 0, endH: 16, endM: 0 };

let DRIVERS = []; // carregado dinamicamente da aba "Motoristas" da planilha

/* ========================================================================= */

let currentDriver = null;
let currentBay = null;

const $ = (id) => document.getElementById(id);
const driverListEl = $('driverList');

/* ---- link pessoal do motorista (?driver=Nome) e link do gestor (?admin=CHAVE) ---- */
const urlParams = new URLSearchParams(window.location.search);
const lockedDriverParam = urlParams.get('driver');
const adminParam = urlParams.get('admin');

if(adminParam && adminParam === ADMIN_KEY){
  $('navToggle').classList.remove('hidden');
}

async function loadDrivers(){
  const input = $('driverInput');
  input.disabled = true;
  input.placeholder = 'Carregando motoristas…';
  try{
    const res = await fetch(`${SHEET_URL}?action=drivers`);
    DRIVERS = await res.json();
  }catch(err){
    DRIVERS = [];
  }

  driverListEl.innerHTML = '';
  DRIVERS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.name;
    driverListEl.appendChild(opt);
  });

  input.disabled = false;
  input.placeholder = 'Digite ou busque o nome';

  // aplica o link pessoal travado, agora que a lista já carregou
  if(lockedDriverParam){
    const found = DRIVERS.find(d => d.name.toLowerCase() === lockedDriverParam.trim().toLowerCase());
    input.readOnly = true;
    input.style.opacity = '.75';
    if(found){
      currentDriver = found;
      input.value = found.name;
      $('driverCard').classList.add('show');
      $('cardPlate').textContent = found.plate || 'sem placa';
      $('cardType').textContent = found.type || '—';
    } else {
      input.value = '';
      input.placeholder = 'Motorista não encontrado — fale com o gestor';
    }
    refreshSubmitState();
    loadAlreadyMarked();
  }
}
loadDrivers();

// ---- driver selection ----
$('driverInput').addEventListener('input', (e) => {
  const match = DRIVERS.find(d => d.name.toLowerCase() === e.target.value.trim().toLowerCase());
  currentDriver = match || null;
  const card = $('driverCard');
  if(match){
    card.classList.add('show');
    $('cardPlate').textContent = match.plate || 'sem placa';
    $('cardType').textContent = match.type || '—';
    loadAlreadyMarked();
  } else {
    card.classList.remove('show');
  }
  refreshSubmitState();
});

// ---- janela de horário para disponibilidade (6h às 16h, mesmo dia) ----
function isWithinAvailabilityWindow(now = new Date()){
  const w = AVAILABILITY_WINDOW;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const startMin = w.startH * 60 + w.startM;
  const endMin = w.endH * 60 + w.endM;
  return nowMin >= startMin && nowMin < endMin;
}

function isToday(isoString){
  const d = new Date(isoString);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

let alreadyMarked = new Set(); // carregamentos já registrados pelo motorista hoje

async function loadAlreadyMarked(){
  if(!currentDriver) { alreadyMarked = new Set(); return; }
  try{
    const res = await fetch(`${SHEET_URL}?action=records&sheet=Disponibilidade`);
    const records = await res.json();
    alreadyMarked = new Set(
      records
        .filter(r => r.driverName === currentDriver.name && isToday(r.timestamp))
        .map(r => r.carregamento)
    );
  }catch(err){
    alreadyMarked = new Set();
  }
  applyAlreadyMarked();
}

function applyAlreadyMarked(){
  document.querySelectorAll('.bay-btn').forEach(btn => {
    const bay = btn.dataset.bay;
    const done = alreadyMarked.has(bay);
    btn.classList.toggle('done', done);
    const label = btn.querySelector('.l');
    if(label) label.textContent = done ? 'Registrado ✓' : 'Toque para confirmar';
    if(done && currentBay === bay){
      btn.classList.remove('active');
      currentBay = null;
    }
  });
  refreshSubmitState();
}

function refreshWindowStatus(){
  const open = isWithinAvailabilityWindow();
  const el = $('windowStatus');
  if(open){
    el.className = 'status-line ok';
    el.style.alignSelf = 'center';
    el.textContent = 'Disponível para marcar (6h às 16h)';
  } else {
    el.className = 'status-line bad';
    el.style.alignSelf = 'center';
    el.textContent = 'Fora do horário — abre às 6h';
  }
  document.querySelectorAll('.bay-btn').forEach(btn => btn.classList.toggle('closed', !open));
  if(!open){
    document.querySelectorAll('.bay-btn').forEach(b => b.classList.remove('active'));
    currentBay = null;
  }
  refreshSubmitState();
}
refreshWindowStatus();
setInterval(refreshWindowStatus, 30000);

// ---- bay selection ----
document.querySelectorAll('.bay-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.classList.contains('closed') || btn.classList.contains('done')) return;
    document.querySelectorAll('.bay-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBay = btn.dataset.bay;
    refreshSubmitState();
  });
});

function refreshSubmitState(){
  const ok = currentDriver && currentBay && isWithinAvailabilityWindow() && !alreadyMarked.has(currentBay);
  $('submitBtn').disabled = !ok;
}

// ---- submit disponibilidade ----
$('submitBtn').addEventListener('click', async () => {
  if(!currentDriver || !currentBay) return;
  $('submitBtn').disabled = true;
  const record = {
    kind: "disponibilidade",
    driverName: currentDriver.name,
    plate: currentDriver.plate,
    vehicleType: currentDriver.type,
    carregamento: currentBay,
    timestamp: new Date().toISOString()
  };
  try{
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(record)
    });
    showToast('ok', `Disponibilidade registrada — ${currentDriver.name} · Carreg. ${currentBay}`);
    alreadyMarked.add(currentBay);
    // reset for next entry (keep driver filled if this is a personal locked link)
    if(!lockedDriverParam){
      $('driverInput').value = '';
      $('driverCard').classList.remove('show');
      currentDriver = null;
      alreadyMarked = new Set();
    }
    document.querySelectorAll('.bay-btn').forEach(b => b.classList.remove('active'));
    currentBay = null;
    applyAlreadyMarked();
  }catch(err){
    showToast('bad', 'Não foi possível salvar. Verifique a internet e tente novamente.');
  }
  refreshSubmitState();
});

function showToast(kind, msg){
  const t = $('toast');
  t.className = `toast show ${kind}`;
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 4000);
}

/* =========================================================================
   REPORT VIEW
   ========================================================================= */
let allRecords = [];

$('navToggle').addEventListener('click', () => {
  const inCheckin = !$('checkinView').classList.contains('hidden');
  $('checkinView').classList.toggle('hidden', inCheckin);
  $('reportView').classList.toggle('hidden', !inCheckin);
  $('navToggle').textContent = inCheckin ? '← Check-in' : 'Relatórios →';
  if(inCheckin) loadReport();
});

async function loadReport(){
  $('reportBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:16px;">Carregando…</td></tr>';
  try{
    const response = await fetch(`${SHEET_URL}?sheet=Disponibilidade`);
    const records = await response.json();
    allRecords = records.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    populateDriverFilter();
    renderReport();
  }catch(err){
    $('reportBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--red);padding:16px;">Erro ao carregar registros da planilha.</td></tr>';
  }
}

function populateDriverFilter(){
  const sel = $('filterDriver');
  const existing = new Set(Array.from(sel.options).map(o => o.value));
  const names = [...new Set(allRecords.map(r => r.driverName))].sort();
  names.forEach(n => {
    if(!existing.has(n)){
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    }
  });
}

function getFiltered(){
  const from = $('filterFrom').value;
  const to = $('filterTo').value;
  const driver = $('filterDriver').value;
  return allRecords.filter(r => {
    const day = r.timestamp.slice(0,10);
    if(from && day < from) return false;
    if(to && day > to) return false;
    if(driver && r.driverName !== driver) return false;
    return true;
  });
}

function renderReport(){
  const filtered = getFiltered();
  const tbody = $('reportBody');
  const emptyNote = $('emptyNote');
  tbody.innerHTML = '';
  emptyNote.classList.toggle('hidden', filtered.length > 0);

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    const dt = new Date(r.timestamp);
    const dtStr = dt.toLocaleDateString('pt-BR');
    tr.innerHTML = `<td>${dtStr}</td><td>${r.driverName}</td><td>${r.plate||'—'}</td><td>${r.vehicleType||'—'}</td>`;
    tbody.appendChild(tr);
  });

  $('summaryRow').innerHTML = `
    <div class="summary-card"><div class="n">${filtered.length}</div><div class="l">Total registrado</div></div>
  `;
}

['filterFrom','filterTo','filterDriver'].forEach(id => {
  $(id).addEventListener('change', renderReport);
});

$('exportBtn').addEventListener('click', () => {
  const filtered = getFiltered();
  const rows = filtered.map(r => ({
    'Data': new Date(r.timestamp).toLocaleDateString('pt-BR'),
    'Motorista': r.driverName,
    'Placa': r.plate || '',
    'Veículo': r.vehicleType || ''
  }));
  try{
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Presenças');
    XLSX.writeFile(wb, `presencas_${new Date().toISOString().slice(0,10)}.xlsx`);
  }catch(err){
    // fallback CSV
    const header = Object.keys(rows[0]||{'Data/Hora':''}).join(';');
    const body = rows.map(r => Object.values(r).join(';')).join('\n');
    const blob = new Blob(['\ufeff'+header+'\n'+body], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `presencas_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }
});
</script>
</body>
</html>
